// ═══════ API ═══════
// Priority: 1) Gemini (if key set)  2) Groq Llama (if key set — same key as transcription)  3) fail
async function callGemini(sys,msg,geminiKey){
  const prompt=sys+"\n\n"+msg;

  // ── 1. Direct Gemini (try 2.0-flash → 1.5-flash on quota error) ──
  if(geminiKey){
    const gemBody=JSON.stringify({contents:[{role:"user",parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1500,temperature:0.3}});
    for(const model of["gemini-2.0-flash","gemini-1.5-flash"]){
      try{
        const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${geminiKey}`,{method:"POST",headers:{"Content-Type":"application/json"},body:gemBody});
        const d=await r.json();
        if(!d.error)return d.candidates?.[0]?.content?.parts?.[0]?.text||null;
        if(!d.error?.message?.includes("quota")&&!d.error?.message?.includes("RESOURCE_EXHAUSTED"))break;
        console.warn("Gemini quota on",model,", trying fallback");
      }catch(e){console.error("Gemini fetch error:",e);break;}
    }
  }

  // ── 2. Groq Llama (reuse transcription key — same free account) ──
  const groqKey=(localStorage.getItem("recallmd_groq")||"").trim();
  if(groqKey){
    try{
      const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+groqKey},
        body:JSON.stringify({
          model:"llama-3.3-70b-versatile",
          messages:[{role:"user",content:prompt}],
          max_tokens:1500,temperature:0.3
        })
      });
      const d=await r.json();
      if(d.error){console.error("Groq chat error:",d.error.message);}
      else return d.choices?.[0]?.message?.content||null;
    }catch(e){console.error("Groq chat error:",e);}
  }

  return null;
}

// Groq Whisper — FREE transcription (console.groq.com)
async function groqWhisper(blob,groqKey,langCode){
  if(!groqKey||!blob)return null;
  try{
    const ext=blob.type.includes("mp4")?"mp4":blob.type.includes("ogg")?"ogg":blob.type.includes("wav")?"wav":blob.type.includes("aac")?"aac":"webm";
    const fd=new FormData();
    fd.append("file",new File([blob],`audio.${ext}`,{type:blob.type||"audio/webm"}));
    fd.append("model","whisper-large-v3-turbo");
    fd.append("response_format","verbose_json");
    fd.append("temperature","0");
    if(langCode&&langCode!=="auto")fd.append("language",langCode);
    const r=await fetch("https://api.groq.com/openai/v1/audio/transcriptions",{
      method:"POST",headers:{"Authorization":"Bearer "+groqKey},body:fd
    });
    if(!r.ok){const e=await r.text();console.warn("Groq:",e);return null;}
    const d=await r.json();
    return d.text||null;
  }catch(e){console.warn("Groq error:",e);return null;}
}

// ═══════ CALENDAR EXPORT ═══════
function parseMedTime(t){const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return null;let h=parseInt(m[1]);const mn=parseInt(m[2]),ap=m[3].toUpperCase();if(ap==="PM"&&h!==12)h+=12;if(ap==="AM"&&h===12)h=0;return{h,mn};}
function buildICS(r){const t=parseMedTime(r.uTime||r.time);if(!t)return"";const pad=n=>String(n).padStart(2,"0");const now=new Date();const base=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;const dt=`${base}T${pad(t.h)}${pad(t.mn)}00`;const dtE=`${base}T${pad(t.h)}${pad(t.mn+15<60?t.mn+15:t.mn)}00`;const title=`💊 ${r.name}${r.dose?" "+r.dose:""}`;return`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//MedNote//EN\r\nBEGIN:VEVENT\r\nDTSTART:${dt}\r\nDTEND:${dtE}\r\nRRULE:FREQ=DAILY\r\nSUMMARY:${title}\r\nDESCRIPTION:${r.note||""} — MedNote\r\nBEGIN:VALARM\r\nTRIGGER:-PT15M\r\nACTION:DISPLAY\r\nDESCRIPTION:Time to take ${r.name}\r\nEND:VALARM\r\nEND:VEVENT\r\nEND:VCALENDAR`;}
function buildGoogleUrl(r){const t=parseMedTime(r.uTime||r.time);if(!t)return"#";const pad=n=>String(n).padStart(2,"0");const now=new Date();const base=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;const dt=`${base}T${pad(t.h)}${pad(t.mn)}00Z`;const dtE=`${base}T${pad(t.h)}${pad(t.mn+15<60?t.mn+15:t.mn)}00Z`;const title=encodeURIComponent(`💊 ${r.name}${r.dose?" "+r.dose:""}`);const det=encodeURIComponent(`${r.note||""} — Added by MedNote`);return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dt}/${dtE}&details=${det}&recur=RRULE%3AFREQ%3DDAILY`;}
function downloadICS(r){const c=buildICS(r);const blob=new Blob([c],{type:"text/calendar;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`${r.name.replace(/\s+/g,"_")}_reminder.ics`;a.click();URL.revokeObjectURL(url);}

function getAD(a){const d=new Date();d.setMonth(d.getMonth()+Math.floor(a.mo));d.setDate(d.getDate()+Math.round((a.mo%1)*30));return d}

// ═══════ APP ═══════
function MedNote(){
  const [theme,setTheme]=useState("light");
  const [elder,setElder]=useState(false);
  const [view,setView]=useState("home");
  const [showLang,setShowLang]=useState(false);
  const [visits,setVisits]=useState(INIT_VISITS);
  const [rems,setRems]=useState(INIT_REMS);
  const [proc,setProc]=useState(false);
  const [procS,setProcS]=useState(0);
  const [rTab,setRTab]=useState("history");
  const [exp,setExp]=useState({});
  const [msgs,setMsgs]=useState([]);
  const [chatIn,setChatIn]=useState("");
  const [chatL,setChatL]=useState(false);
  const [calS,setCalS]=useState(null);
  const [showMiss,setShowMiss]=useState(false);
  const [editR,setEditR]=useState(null);
  const [showMedImg,setShowMedImg]=useState({});
  const [medImgData,setMedImgData]=useState({});
  const [calExportOpen,setCalExportOpen]=useState(null);
  // Audio recording
  const [isRec,setIsRec]=useState(false);
  const [recTime,setRecTime]=useState(0);
  const [liveLines,setLiveLines]=useState([]);
  const [audioUrl,setAudioUrl]=useState(null);
  const [isPlaying,setIsPlaying]=useState(null);
  // Provisional items notification
  const [showProvNotif,setShowProvNotif]=useState(true);
  // Translation loading per visit
  const [transLoading,setTransLoading]=useState({});

  const mediaRec=useRef(null);
  const audioChunks=useRef([]);
  const timerRef=useRef(null);
  const audioRef=useRef(null);
  const chatEnd=useRef(null);
  const sttRef=useRef(null);
  const streamRef=useRef(null);
  const recTimeRef=useRef(0);
  const liveRef=useRef([]);
  const stoppingRef=useRef(false);
  const uploadBlobRef=useRef(null);
  const langBtnRef=useRef(null);
  const [langBtnPos,setLangBtnPos]=useState({top:50,right:8});

  // New state — keys loaded from localStorage so they persist across sessions
  const [groqKey,setGroqKeyRaw]=useState(()=>localStorage.getItem("recallmd_groq")||"");
  const [geminiKey,setGeminiKeyRaw]=useState(()=>localStorage.getItem("recallmd_gemini")||"");
  const [lang,setLangRaw]=useState(()=>localStorage.getItem("recallmd_lang")||"en");
  const [showSettings,setShowSettings]=useState(false);
  const [recLang,setRecLang]=useState("auto");
  const [notifModal,setNotifModal]=useState(null);
  const [remTab,setRemTab]=useState("all");
  const [calMonth,setCalMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const [calDay,setCalDay]=useState(null);
  const [docProc,setDocProc]=useState("idle");
  const docFileRef=useRef(null);

  // Wrap setters to also persist to localStorage
  const setGroqKey=v=>{setGroqKeyRaw(v);localStorage.setItem("recallmd_groq",v);};
  const setGeminiKey=v=>{setGeminiKeyRaw(v);localStorage.setItem("recallmd_gemini",v);};
  const setLang=v=>{setLangRaw(v);localStorage.setItem("recallmd_lang",v);};
  const [userName, setUserNameRaw] = useState(()=>localStorage.getItem("recallmd_name")||"");
  const setUserName = v => { setUserNameRaw(v); localStorage.setItem("recallmd_name", v); };

  // ── BACKEND SYNC ─────────────────────────────────────────────────────────
  // Set this to your deployed backend URL.
  // During local dev, use "http://localhost:8000"
  const API_BASE = (window.MEDNOTE_API_BASE || "").replace(/\/+$/,"");

  const [userId] = useState(()=>{
    let id = localStorage.getItem("recallmd_uid");
    if(!id){ id = "u_" + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem("recallmd_uid",id); }
    return id;
  });
  const [syncStatus, setSyncStatus] = useState("idle"); // "idle"|"syncing"|"ok"|"error"

  // Push all data to backend (debounced — waits 1.5s after last change)
  const syncTimer = useRef(null);
  const pushSync = useCallback((v, r) => {
    if(!API_BASE) return;
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(async () => {
      setSyncStatus("syncing");
      try {
        const res = await fetch(API_BASE + "/api/sync", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({userId, visits: v, reminders: r})
        });
        setSyncStatus(res.ok ? "ok" : "error");
        setTimeout(() => setSyncStatus("idle"), 2000);
      } catch(e) { setSyncStatus("error"); setTimeout(()=>setSyncStatus("idle"),3000); }
    }, 1500);
  }, [API_BASE, userId]);

  // Pull data from backend on first load
  useEffect(()=>{
    if(!API_BASE) return;
    (async()=>{
      try {
        // Register user
        await fetch(API_BASE + "/api/user", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({userId, name: userName||"User"})
        });
        // Pull records
        const res = await fetch(API_BASE + "/api/records/" + userId);
        if(res.ok){
          const data = await res.json();
          if(data.visits?.length)   setVisits(data.visits);
          if(data.reminders?.length) setRems(data.reminders);
        }
      } catch(e){ console.warn("MedNote sync pull failed:", e); }
    })();
  }, [API_BASE]);

  // Auto-push whenever visits or reminders change
  useEffect(()=>{ pushSync(visits, rems); }, [visits, rems]);

  // ── Render keep-alive ping ────────────────────────────────────────────────
  // Render free tier sleeps after 15 min inactivity (causes ~30s cold start).
  // Ping every 10 min while the tab is open to prevent that.
  useEffect(()=>{
    if(!API_BASE) return;
    const id = setInterval(()=>{
      fetch(API_BASE + "/ping").catch(()=>{});
    }, 10 * 60 * 1000); // every 10 minutes
    return () => clearInterval(id);
  }, [API_BASE]);
  // ── End keep-alive ────────────────────────────────────────────────────────
  // ── END BACKEND SYNC ──────────────────────────────────────────────────────

  const [uploadStatus,setUploadStatus]=useState("idle");
  const [uploadedFileName,setUploadedFileName]=useState("");
  const [interimLine,setInterimLine]=useState("");

  const dk=theme==="dark";
  const nowTotalMin=new Date().getHours()*60+new Date().getMinutes();
  const missN=rems.filter(r=>!r.done&&(r.hr*60+(r.mn||0))<nowTotalMin).length;
  const doneN=rems.filter(r=>r.done).length;
  const provItems=visits.flatMap(v=>(v.extractedItems||[]).filter(e=>e.status==="provisional"));

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"})},[msgs]);
  useEffect(()=>{if(missN>0){const t=setTimeout(()=>setShowMiss(true),2000);return()=>clearTimeout(t)}},[missN]);
  useEffect(()=>{recTimeRef.current=recTime},[recTime]);
  useEffect(()=>{liveRef.current=liveLines},[liveLines]);

  // Auto-translate all untranslated visits when language changes
  useEffect(()=>{
    if(lang==="en")return;
    const untranslated=visits.filter(v=>v.summary&&!v.summary.startsWith("[")&&!v.translatedSummary&&v.summary.length>10);
    if(untranslated.length===0)return;
    const ln=LANGS.find(l=>l.c===lang)?.n||"English";
    untranslated.forEach(async(v)=>{
      const translated=await callGemini(
        `Medical translator. Translate to ${ln}. Keep drug names, headings, and emoji intact. Return only the translation, no preamble.`,
        v.summary,
        (localStorage.getItem("recallmd_gemini")||"").trim()
      );
      if(translated)setVisits(p=>p.map(x=>x.id===v.id?{...x,translatedSummary:translated}:x));
    });
  },[lang]);


  const tog=k=>setExp(p=>({...p,[k]:!p[k]}));
  const isO=k=>!!exp[k];

  // ── STT live display ──
  const startLiveSTT=(bcp47)=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR)return;
    const launch=()=>{
      if(stoppingRef.current)return;
      try{
        const stt=new SR();
        stt.continuous=true;stt.interimResults=true;stt.lang=bcp47;
        stt.onresult=e=>{
          let interim="";
          for(let i=e.resultIndex;i<e.results.length;i++){
            if(e.results[i].isFinal){const tx=e.results[i][0].transcript.trim();if(tx){setLiveLines(p=>[...p,tx]);setInterimLine("");}}
            else interim+=e.results[i][0].transcript;
          }
          setInterimLine(interim);
        };
        stt.onend=()=>{if(!stoppingRef.current)setTimeout(launch,200);};
        stt.onerror=()=>{if(!stoppingRef.current)setTimeout(launch,400);};
        stt.start();sttRef.current=stt;
      }catch(_){}
    };
    launch();
  };

  const killSTT=()=>{
    stoppingRef.current=true;
    if(sttRef.current){try{sttRef.current.onend=null;sttRef.current.onerror=null;sttRef.current.onresult=null;sttRef.current.abort();}catch(_){}sttRef.current=null;}
  };

  const killStream=()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>{try{t.stop();}catch(_){}});streamRef.current=null;}
  };

  // ── Start recording ──
  const startRec=async()=>{
    stoppingRef.current=false;
    audioChunks.current=[];
    setIsRec(true);setRecTime(0);setLiveLines([]);setInterimLine("");
    timerRef.current=setInterval(()=>setRecTime(t=>t+1),1000);
    const bcp47=recLang==="auto"?"en-US":(LANG_BCP[recLang]||"en-US");
    startLiveSTT(bcp47);
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      streamRef.current=stream;
      const mimeType=["audio/webm;codecs=opus","audio/webm","audio/ogg",""].find(t=>!t||MediaRecorder.isTypeSupported(t));
      const mr=new MediaRecorder(stream,mimeType?{mimeType}:{});
      mr.ondataavailable=e=>{if(e.data&&e.data.size>0)audioChunks.current.push(e.data);};
      mr.start(250);mediaRec.current=mr;
    }catch(e){
      clearInterval(timerRef.current);killSTT();setIsRec(false);
      alert("Microphone access denied. Please allow microphone and try again.");
    }
  };

  // ── Stop recording ──
  const stopRec=()=>{
    setIsRec(false);setInterimLine("");
    clearInterval(timerRef.current);
    killSTT();
    const snap=[...liveRef.current];
    const snapTime=recTimeRef.current||0;
    const mr=mediaRec.current;
    if(mr&&mr.state!=="inactive"){
      mr.onstop=async()=>{
        const chunks=[...audioChunks.current];
        audioChunks.current=[];mediaRec.current=null;killStream();
        if(chunks.length>0){
          const blob=new Blob(chunks,{type:chunks[0].type||"audio/webm"});
          const url=URL.createObjectURL(blob);
          setAudioUrl(url);
          await runPipeline(blob,url,snap,snapTime);
        }else{await runPipeline(null,null,snap,snapTime);}
      };
      try{mr.requestData();mr.stop();}catch(_){mediaRec.current=null;killStream();runPipeline(null,null,snap,snapTime);}
    }else{mediaRec.current=null;killStream();runPipeline(null,null,snap,snapTime);}
  };

  // ── Main AI Pipeline ──
  // 1. Groq Whisper → original language transcript
  // 2. Claude translate → user's language
  // 3. Claude summarize → patient summary
  // 4. Claude extract → medications, appointments, actions
  // 5. Show notification modal
  const runPipeline=async(audioBlob,blobUrl,liveFallback,recDur)=>{
    setProc(true);setProcS(1);
    const userLang=lang;
    const userLangName=LANGS.find(l=>l.c===userLang)?.n||"English";
    const docLang=recLang==="auto"?undefined:recLang;
    const docLangName=LANGS.find(l=>l.c===recLang)?.n||"the original language";
    // Read from localStorage directly — avoids stale closure if key was just saved
    const gKey=(localStorage.getItem("recallmd_groq")||groqKey||"").trim();
    const cKey=(localStorage.getItem("recallmd_gemini")||geminiKey||"").trim();

    // STEP 2 — Transcribe in original language
    setProcS(2);
    let originalText=(liveFallback||[]).join(" ");
    let originalLines=liveFallback||[];

    if(audioBlob&&gKey){
      const whisperText=await groqWhisper(audioBlob,gKey,docLang);
      if(whisperText){
        originalText=whisperText;
        originalLines=whisperText.match(/[^.!?\n]+[.!?\n]*/g)||[whisperText];
        originalLines=originalLines.map(l=>l.trim()).filter(l=>l.length>1);
      }
    }
    if(!originalText)originalText="[No transcript — add a Groq API key in Settings for transcription]";

    // STEP 3 — Create visit immediately (loading state), run both AI calls in parallel
    setProcS(3);
    const dur=recDur>0?`${Math.floor(recDur/60)}m ${recDur%60}s`:"uploaded";
    const visitId="v"+Date.now();

    // Show visit card right away — summary=null means "loading"
    const earlyVisit={
      id:visitId,doc:(T[userLang]||T.en).newRecording.replace(/[🎙️\s]+/g,"").trim()||"New Recording",spec:"",
      date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
      time:new Date().toLocaleTimeString((()=>{const m={en:"en-US",zh:"zh-CN",fr:"fr-FR",de:"de-DE",ja:"ja-JP",ko:"ko-KR",es:"es-ES",hi:"hi-IN",vi:"vi-VN",ar:"ar-SA"};return m[userLang]||"en-US";})(),{hour:"numeric",minute:"2-digit"}),
      dur,
      originalLang:recLang==="auto"?"en":recLang,
      originalTranscript:originalLines.length?originalLines:[originalText],
      translatedTranscript:null,
      summary:null,
      translatedSummary:null,
      audioUrl:blobUrl||null,
      extractedItems:[],meds:[]
    };
    setVisits(p=>[earlyVisit,...p]);
    setProc(false);
    setUploadStatus("idle");setUploadedFileName("");uploadBlobRef.current=null;
    setView("records");setRTab("history");
    setExp(prev=>({...prev,[visitId+"-s"]:true}));

    // Both AI calls in parallel — Puter free proxy used automatically when no key
    const [summaryResult,extractResult]=await Promise.all([
      callGemini(
        "Medical appointment summarizer. Warm, concise, plain language.",
        `Brief summary in ${userLangName}. Headings: 📋 Findings 💊 Medications ⚠️ Watch for 📅 Next steps\n\nTranscript:\n${originalText}\n\nWrite entirely in ${userLangName}.`,
        cKey
      ),
      callGemini(
        "Medical data extractor. Return ONLY a valid JSON array, no markdown, no other text.",
        `Extract actionable items from the transcript. Respond ONLY with a valid JSON array (no markdown, no extra text), each item: {"type":"medication"|"appointment"|"action","text":"description in ${userLangName}","time":"time/date","suggestedHour":8}\n\nIMPORTANT: All "text" values MUST be written in ${userLangName}.\n\nTranscript:\n${originalText}`,
        cKey
      )
    ]);

    let extracted=[];
    if(extractResult){
      try{
        const clean=extractResult.replace(/```json|```/gi,"").replace(/^[^[]*(\[)/,"$1").replace(/\][^]]*$/,"]").trim();
        const parsed=JSON.parse(clean);
        if(Array.isArray(parsed))extracted=parsed;
      }catch(e){console.warn("Extract parse:",e);}
    }

    const extractedItems=extracted
      .filter(e=>e&&e.text)
      .map((e,i)=>({
        id:"ei"+(Date.now()+i),
        type:["medication","appointment","action"].includes(e.type)?e.type:"action",
        text:String(e.text).trim(),
        time:String(e.time||"").trim(),
        suggestedHour:Number(e.suggestedHour)||8,
        status:"provisional"
      }));

    const meds=extractedItems.filter(e=>e.type==="medication").map(e=>({
      name:e.text.split(/[\s,—–-]/)[0]||"Medication",
      dose:e.text.match(/\d+\s*mg/i)?.[0]||"",change:null
    }));

    const te=T_EXTRA[userLang]||T_EXTRA.en;
    const finalSummary=summaryResult||(te.summaryFailedMsg||"AI summary could not be generated.");

    // Update visit card with results
    setVisits(p=>p.map(v=>v.id===visitId?{
      ...v,
      summary:finalSummary,
      translatedSummary:userLang!=="en"?finalSummary:null,
      extractedItems,meds
    }:v));

    // Auto-add extracted medications to the Meds schedule immediately
    const pad=n=>String(n).padStart(2,"0");
    const autoRems=extractedItems
      .filter(e=>e.type==="medication")
      .map((item,i)=>{
        const h=item.suggestedHour||8;
        const ampm=h>=12?"PM":"AM";const h12=h%12||12;
        return{
          id:Date.now()+i+1000,
          name:item.text.split(/[\s,—–\-]/)[0]||"Medication",
          dose:item.text.match(/\d+\s*mg/i)?.[0]||"",
          time:`${h12}:${pad(0)} ${ampm}`,
          note:item.text,done:false,freq:"daily",type:"medication",
          hr:h,mn:0,mx:h+2,
          uTime:`${h12}:${pad(0)} ${ampm}`
        };
      });
    if(autoRems.length>0)setRems(p=>[...p,...autoRems]);

    // Show notification modal for adjusting reminder times (optional — already added above)
    if(extractedItems.length>0){
      setNotifModal({visitId,items:extractedItems.map(i=>({...i,notifHour:i.suggestedHour,notifMin:0}))});
    }else{
      setShowProvNotif(true);
    }
  };

  const playAudio=(url)=>{
    if(audioRef.current){audioRef.current.pause();audioRef.current=null;setIsPlaying(null);if(isPlaying===url)return;}
    const a=new Audio(url);a.onended=()=>setIsPlaying(null);a.play();audioRef.current=a;setIsPlaying(url);
  };

  // ── Translate a visit summary ──
  const translateVisit=async(visitId)=>{
    if(lang==="en")return;
    setTransLoading(p=>({...p,[visitId]:true}));
    const v=visits.find(x=>x.id===visitId);if(!v)return;
    const ln=LANGS.find(l=>l.c===lang)?.n||"English";
    const translated=await callGemini(
      `Medical translator. Translate to ${ln}. Keep drug names. Return only the translation.`,
      v.summary,geminiKey.trim()
    );
    if(translated)setVisits(p=>p.map(x=>x.id===visitId?{...x,translatedSummary:translated}:x));
    setTransLoading(p=>({...p,[visitId]:false}));
  };

  // ── Retry AI summary for a visit that failed ──
  const retryAI=async(visitId)=>{
    const v=visits.find(x=>x.id===visitId);if(!v)return;
    const transcript=(v.originalTranscript||[]).join(" ");
    if(!transcript||transcript.startsWith("["))return;
    setVisits(p=>p.map(x=>x.id===visitId?{...x,summary:null}:x));
    const userLangName=LANGS.find(l=>l.c===lang)?.n||"English";
    const result=await callGemini(
      "Medical appointment summarizer. Warm, concise, plain language.",
      `Brief summary in ${userLangName}. Headings: 📋 Findings 💊 Medications ⚠️ Watch for 📅 Next steps\n\nTranscript:\n${transcript}\n\nWrite entirely in ${userLangName}.`,
      geminiKey.trim()
    );
    const te2=T_EXTRA[lang]||T_EXTRA.en;
    setVisits(p=>p.map(x=>x.id===visitId?{...x,
      summary:result||(te2.retrySummaryFailed||"Still unable to generate."),
      translatedSummary:lang!=="en"?result:null
    }:x));
  };

  // ── Update extracted item status ──
  const updateItemStatus=(visitId,itemId,newStatus)=>{
    setVisits(p=>p.map(v=>v.id===visitId?{...v,extractedItems:v.extractedItems.map(e=>e.id===itemId?{...e,status:newStatus}:e)}:v));
  };
  const deleteItem=(visitId,itemId)=>{
    setVisits(p=>p.map(v=>v.id===visitId?{...v,extractedItems:v.extractedItems.filter(e=>e.id!==itemId)}:v));
  };

  const processDocFile=async(file)=>{
    if(!file)return;
    const cKey=(localStorage.getItem("recallmd_gemini")||geminiKey||"").trim();
    if(!cKey){alert("Document extraction requires a Gemini API key — add it in ⚙️ Settings.");return;}
    setDocProc("processing");
    const userLangName=LANGS.find(l=>l.c===lang)?.n||"English";
    try{
      const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      const mime=file.type||"application/octet-stream";
      const docPrompt=`Medical document analyzer. Provide:\n1. A clear summary in ${userLangName} with headings: 📋 Findings 💊 Medications ⚠️ Watch for 📅 Next steps\n2. Then write "---EXTRACT---" followed by a JSON array:\n[{"type":"medication"|"appointment"|"action","text":"description in ${userLangName}","time":"time/date","suggestedHour":8}]\n\nIMPORTANT: All JSON "text" values MUST be in ${userLangName}.\n\nSummary first, then JSON.`;
      const body=JSON.stringify({contents:[{role:"user",parts:[{inlineData:{mimeType:mime,data:base64}},{text:docPrompt}]}],generationConfig:{maxOutputTokens:2000,temperature:0.3}});
      // Try models in order: 2.0-flash → 1.5-flash → 1.5-flash-8b
      const models=["gemini-2.0-flash","gemini-1.5-flash","gemini-1.5-flash-8b"];
      let d=null;
      for(const model of models){
        const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${cKey}`,{method:"POST",headers:{"Content-Type":"application/json"},body});
        const json=await resp.json();
        if(!json.error){d=json;break;}
        // If quota error, parse retry-after and wait, then continue to next model
        const msg=json.error?.message||"";
        const retryMatch=msg.match(/retry in ([\d.]+)s/i);
        if(retryMatch&&models.indexOf(model)<models.length-1){
          const wait=Math.min(Math.ceil(parseFloat(retryMatch[1]))*1000,35000);
          await new Promise(r=>setTimeout(r,wait));
        }
        console.warn(`${model} failed:`,msg);
      }
      if(!d||d.error)throw new Error(d?.error?.message||"All models failed");
      const fullText=d.candidates?.[0]?.content?.parts?.[0]?.text||"";
      const [summaryPart,extractPart]=fullText.split("---EXTRACT---");
      const summary=summaryPart.trim();
      let extracted=[];
      if(extractPart){try{const m=extractPart.match(/\[[\s\S]*\]/);if(m){const p=JSON.parse(m[0]);if(Array.isArray(p))extracted=p;}}catch(e){}}
      const visitId="v"+Date.now();
      const pad=n=>String(n).padStart(2,"0");
      const extractedItems=extracted.filter(e=>e&&e.text).map((e,i)=>({id:"d"+Date.now()+i,type:e.type||"action",text:e.text,time:e.time||"",status:"provisional",suggestedHour:e.suggestedHour||8}));
      const visit={id:visitId,doc:file.name.replace(/\.[^.]+$/,""),spec:"Document",
        date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
        time:new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),
        dur:"document",originalLang:"en",originalTranscript:[`Document: ${file.name}`],
        translatedTranscript:null,summary,translatedSummary:null,audioUrl:null,extractedItems,meds:[]};
      setVisits(p=>[visit,...p]);
      const autoRems=extractedItems.filter(e=>e.type==="medication").map((item,i)=>{
        const h=item.suggestedHour||8;const ampm=h>=12?"PM":"AM";const h12=h%12||12;const ts=`${h12}:${pad(0)} ${ampm}`;
        return{id:Date.now()+i+2000,name:item.text.split(/[\s,]/)[0]||"Medication",dose:item.text.match(/\d+\s*mg/i)?.[0]||"",time:ts,note:item.text,done:false,freq:"daily",type:"medication",hr:h,mn:0,mx:h+2,uTime:ts};
      });
      if(autoRems.length>0)setRems(p=>[...p,...autoRems]);
      if(extractedItems.length>0)setNotifModal({visitId,items:extractedItems.map(i=>({...i,notifHour:i.suggestedHour,notifMin:0}))});
      setDocProc("idle");setView("records");setRTab("history");setExp(prev=>({...prev,[visitId+"-s"]:true}));
    }catch(e){console.error("Doc error:",e);alert("Could not process document: "+e.message);setDocProc("idle");}
