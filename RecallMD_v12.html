              <line x1="64" y1="46" x2="78" y2="46" stroke="#4da8d8" strokeWidth="2" strokeLinecap="round"/>
              <line x1="64" y1="53" x2="76" y2="53" stroke="#4da8d8" strokeWidth="2" strokeLinecap="round"/>
              <line x1="64" y1="60" x2="72" y2="60" stroke="#4da8d8" strokeWidth="2" strokeLinecap="round"/>
            </svg>
          </div>
          <div>
            <h2 style={{fontSize:elder?"20px":"16px",fontWeight:800,margin:0,letterSpacing:"-0.3px"}}>{userName ? `Hello, ${userName} 👋` : "Hello 👋"}</h2>
          </div>
        </div>
        <button onClick={()=>setView("reminders")} style={{width:"40px",height:"40px",borderRadius:"50%",border:"1px solid "+bd,background:cBg,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",boxShadow:"0 1px 4px rgba(0,0,0,.06)",flexShrink:0}}>
          <BellIc s={18}/>
          {missN>0&&<div style={{position:"absolute",top:"6px",right:"6px",width:"8px",height:"8px",borderRadius:"50%",background:"#ef4444",border:"2px solid "+cBg}}/>}
        </button>
      </div>
      <p style={{fontSize:fs.s,color:t2,marginBottom:"16px"}}>{tr.healthTasksMsg(rems.filter(r=>!r.done).length)}</p>

      {/* Setup banner */}
      {(!groqKey&&!geminiKey)&&<div style={{padding:"12px 14px",borderRadius:"14px",background:acc+"08",border:"1px solid "+acc+"20",marginBottom:"14px",display:"flex",alignItems:"center",gap:"10px"}}>\
        <span style={{fontSize:"22px"}}>🚀</span>
        <div style={{flex:1}}>
          <div style={{fontSize:fs.s,fontWeight:700,color:acL}}>{tr.addGroqUnlock}</div>
          <div style={{fontSize:fs.xs,color:t3,marginTop:"2px"}}>{tr.addGroqDesc}</div>
        </div>
        <button onClick={()=>setShowSettings(true)} style={{padding:"6px 12px",borderRadius:"8px",border:"none",background:acc,color:"#fff",fontWeight:600,fontSize:fs.xs,cursor:"pointer",flexShrink:0}}>⚙️ {tr.setupBtn}</button>
      </div>}

      {showMiss&&missN>0&&<div style={{padding:"12px",borderRadius:"14px",background:dk?"rgba(239,68,68,.1)":"rgba(239,68,68,.06)",border:"2px solid rgba(239,68,68,.35)",marginBottom:"14px",animation:"shake .5s",display:"flex",alignItems:"center",gap:"10px"}}>
        <span style={{fontSize:"22px"}}>🔔</span>
        <div style={{flex:1}}><div style={{fontSize:fs.s,fontWeight:700,color:"#ef4444"}}>{tr.missed(missN)}</div></div>
        <button onClick={()=>{setView("reminders");setShowMiss(false)}} style={{padding:"6px 12px",borderRadius:"8px",border:"none",background:"#ef4444",color:"#fff",fontWeight:600,fontSize:fs.xs,cursor:"pointer"}}>{tr.viewBtn}</button>
      </div>}

      {/* Mic record button */}
      <div style={{display:"flex",justifyContent:"center",marginBottom:"16px"}}>
        <button onClick={()=>{setView("records");setRTab("new")}} style={{width:elder?"90px":"76px",height:elder?"90px":"76px",borderRadius:"50%",border:"none",background:acc,color:"#fff",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"4px",boxShadow:"0 4px 20px rgba(0,123,255,.35)"}}>
          <MicIc s={elder?28:22}/><span style={{fontSize:elder?"12px":"10px",fontWeight:700}}>{tr.record}</span>
        </button>
      </div>

      {/* 2×2 quick action grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}}>
        {[
          {id:"records",emoji:"🎙️",l:elder?tr.visits:tr.records,sub:tr.viewHistory,iconBg:dk?"rgba(0,123,255,.15)":"#e8f4ff"},
          {id:"chat",emoji:"🧠",l:tr.askAI,sub:tr.smartAssistant,iconBg:dk?"rgba(124,58,237,.15)":"#f3e8ff"},
          {id:"reminders",emoji:"💊",l:tr.meds,sub:tr.remindersLabel||tr.meds,iconBg:dk?"rgba(239,68,68,.15)":"#fee2e2"},
          {id:"health",emoji:"❤️",l:tr.health,sub:tr.vitalStats,iconBg:dk?"rgba(22,163,74,.15)":"#dcfce7"},
        ].map(card=><button key={card.id} onClick={()=>setView(card.id)} style={{padding:elder?"22px 16px":"18px 14px",borderRadius:"16px",border:"1px solid "+bd,background:cBg,cursor:"pointer",textAlign:"left",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
          <div style={{width:elder?"48px":"40px",height:elder?"48px":"40px",borderRadius:"12px",background:card.iconBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:elder?"22px":"18px",marginBottom:"12px"}}>{card.emoji}</div>
          <div style={{fontSize:fs.b,fontWeight:700,color:t1,marginBottom:"2px"}}>{card.l}</div>
          <div style={{fontSize:fs.xs,color:t3}}>{card.sub}</div>
        </button>)}
      </div>

      {!elder&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}}>
        {[{id:"upload",emoji:"📄",l:tr.upload,sub:tr.pdfImages,iconBg:dk?"rgba(124,58,237,.15)":"#ede9fe"},{id:"calendar",emoji:"📅",l:tr.calendar,sub:tr.scheduleLabel,iconBg:dk?"rgba(13,148,136,.15)":"#ccfbf1"}].map(c=><button key={c.id} onClick={()=>setView(c.id)} style={{padding:"12px 14px",borderRadius:"14px",border:"1px solid "+bd,background:cBg,cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
          <div style={{width:"32px",height:"32px",borderRadius:"9px",background:c.iconBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",flexShrink:0}}>{c.emoji}</div>
          <div style={{textAlign:"left"}}><div style={{fontSize:fs.s,fontWeight:600,color:t1}}>{c.l}</div><div style={{fontSize:fs.xs,color:t3}}>{c.sub}</div></div>
        </button>)}
      </div>}

      {/* Today's Progress blue card */}
      {rems.length>0&&<div style={{padding:"20px 22px",borderRadius:"18px",background:acc,color:"#fff",boxShadow:"0 8px 24px rgba(0,123,255,.3)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <h3 style={{fontSize:fs.h2,fontWeight:700,marginBottom:"4px",margin:0}}>{tr.todaysProgress}</h3>
          <p style={{fontSize:fs.s,opacity:.85,margin:"4px 0 14px"}}>{tr.almostThere(doneN,rems.length)}</p>
          <button onClick={()=>setView("reminders")} style={{padding:"7px 16px",borderRadius:"20px",background:"#fff",color:acc,fontSize:fs.xs,fontWeight:700,border:"none",cursor:"pointer",letterSpacing:"0.4px",textTransform:"uppercase"}}>
            {tr.finishDailyList}
          </button>
        </div>
        <div style={{position:"relative",flexShrink:0,width:"72px",height:"72px"}}>
          <svg width="72" height="72" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="32" fill="transparent" stroke="rgba(255,255,255,.3)" strokeWidth="6"/>
            <circle cx="40" cy="40" r="32" fill="transparent" stroke="#ffffff" strokeWidth="6" strokeLinecap="round"
              strokeDasharray="201.06"
              strokeDashoffset={201.06*(1-(rems.length>0?doneN/rems.length:0))}
              style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%",transition:"stroke-dashoffset .35s"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:fs.s,fontWeight:700}}>
            {rems.length>0?Math.round(doneN/rems.length*100):0}%
          </div>
        </div>
      </div>}
    </div>}

    {/* ══ PROCESSING ══ */}
    {proc&&<div style={{display:"flex",flexDirection:"column",justifyContent:"center",minHeight:"450px",animation:"fadeUp .4s"}}>
      <h3 style={{fontSize:fs.h2,fontWeight:700,marginBottom:"20px"}}>{tr.analyzing}</h3>
      {[
        {e:"🎙️",l:"Audio saved"},
        {e:"📝",l:groqKey?"Transcribing (Groq Whisper)...":"Preparing transcript..."},
        {e:"🧠",l:`Generating summary & extracting items in ${LANGS.find(l=>l.c===lang)?.n||"English"}...`},
        {e:"✅",l:"Done!"}
      ].map(({e,l},i)=>{const d=procS>i+1,a=procS===i+1;
        return <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"11px",borderRadius:"10px",background:d?"rgba(34,197,94,.06)":a?acc+"0a":"transparent",opacity:d||a?1:.2,transition:"all .4s"}}>
          <span style={{fontSize:"16px"}}>{e}</span>
          <span style={{fontSize:fs.b,fontWeight:a?600:400,color:d?"#4ade80":a?t1:t3}}>{l}</span>
          {a&&<div style={{marginLeft:"auto",width:"6px",height:"6px",borderRadius:"50%",background:acL,animation:"pulse 1s infinite"}}/>}
        </div>;
      })}
    </div>}

    {/* ══ RECORDS ══ */}
    {view==="records"&&!proc&&<div style={{animation:"fadeUp .4s",paddingTop:"18px"}}>
      <h2 style={{fontSize:fs.h1,fontWeight:800,marginBottom:"14px"}}>{tr.records}</h2>
      <div style={{display:"flex",gap:"4px",padding:"4px",borderRadius:"12px",background:cBg,border:"1px solid "+bd,marginBottom:"14px"}}>
        <button onClick={()=>setRTab("history")} style={{flex:1,padding:"9px",borderRadius:"9px",border:"none",background:rTab==="history"?acc+"1a":"transparent",color:rTab==="history"?acL:t3,fontSize:fs.b,fontWeight:rTab==="history"?700:400,cursor:"pointer"}}>{tr.pastVisits}</button>
        <button onClick={()=>setRTab("new")} style={{flex:1,padding:"9px",borderRadius:"9px",border:"none",background:rTab==="new"?acc+"1a":"transparent",color:rTab==="new"?acL:t3,fontSize:fs.b,fontWeight:rTab==="new"?700:400,cursor:"pointer"}}>{tr.newRecording}</button>
      </div>

      {/* New Recording tab */}
      {rTab==="new"&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:"4px"}}>

        {/* Secure & Encrypted badge */}
        <div style={{display:"flex",alignItems:"center",gap:"6px",padding:"5px 14px",borderRadius:"20px",background:acc+"0f",border:"1px solid "+acc+"25",marginBottom:"14px"}}>
          <span style={{fontSize:"12px"}}>🔒</span>
          <span style={{fontSize:fs.xs,fontWeight:700,color:acL,letterSpacing:"0.5px",textTransform:"uppercase"}}>{tr.secureEncrypted}</span>
        </div>

        {/* API status */}
        <div style={{width:"100%",display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"10px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"4px",padding:"4px 10px",borderRadius:"20px",background:groqKey?"rgba(34,197,94,.08)":"rgba(245,158,11,.08)",border:"1px solid "+(groqKey?"rgba(34,197,94,.25)":"rgba(245,158,11,.25)"),fontSize:fs.xs,color:groqKey?"#4ade80":"#fbbf24"}}>
            {groqKey?tr.groqReady:tr.noGroqKey}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"4px",padding:"4px 10px",borderRadius:"20px",background:(geminiKey||groqKey)?"rgba(34,197,94,.08)":"rgba(245,158,11,.08)",border:"1px solid "+((geminiKey||groqKey)?"rgba(34,197,94,.25)":"rgba(245,158,11,.25)"),fontSize:fs.xs,color:(geminiKey||groqKey)?"#4ade80":"#fbbf24"}}>
            {geminiKey?tr.aiGeminiReady:groqKey?tr.aiGroqReady:tr.addKeyForSummaries}
          </div>
          <button onClick={()=>setShowSettings(true)} style={{padding:"4px 10px",borderRadius:"20px",border:"1px solid "+bd,background:"transparent",color:acL,fontSize:fs.xs,cursor:"pointer"}}>⚙️ {tr.settingsTitleLabel}</button>
        </div>

        {/* Doctor language picker */}
        <div style={{width:"100%",marginBottom:"12px",padding:"8px 12px",borderRadius:"10px",background:cBg,border:"1px solid "+bd,display:"flex",alignItems:"center",gap:"8px"}}>
          <span style={{fontSize:fs.s,color:t2,flexShrink:0}}>{tr.doctorSpeaks}</span>
          <select value={recLang} onChange={e=>setRecLang(e.target.value)} style={{flex:1,background:"transparent",border:"none",color:acL,fontSize:fs.s,fontWeight:600,cursor:"pointer",outline:"none"}}>
            <option value="auto">{tr.autoDetect}</option>
            {LANGS.map(l=><option key={l.c} value={l.c}>{l.f} {l.n}</option>)}
          </select>
        </div>

        <p style={{color:t2,fontSize:fs.b,marginBottom:"16px",textAlign:"center"}}>{isRec?tr.recActive(fmt(recTime)):tr.tapToRecord}</p>

        {/* Record button */}
        <div style={{position:"relative",marginBottom:"16px"}}>
          {isRec&&<><div style={{position:"absolute",inset:"-20px",borderRadius:"50%",border:"2px solid rgba(239,68,68,.3)",animation:"ripple 2s infinite"}}/><div style={{position:"absolute",inset:"-20px",borderRadius:"50%",border:"2px solid rgba(239,68,68,.15)",animation:"ripple 2s infinite .7s"}}/></>}
          <button id="rec-btn" data-rec={isRec?"1":"0"}
            onClick={()=>{const b=document.getElementById("rec-btn");b.getAttribute("data-rec")==="1"?stopRec():startRec();}}
            style={{width:"100px",height:"100px",borderRadius:"50%",border:"none",background:isRec?"linear-gradient(135deg,#dc2626,#f87171)":acc,color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:isRec?"0 0 40px rgba(239,68,68,.3)":"0 0 40px rgba(0,123,255,.3)",position:"relative",zIndex:5}}>
            {isRec?<div style={{width:"26px",height:"26px",borderRadius:"6px",background:"#fff"}}/>:<MicIc s={28}/>}
          </button>
        </div>

        {/* Waveform */}
        {isRec&&<div style={{display:"flex",alignItems:"center",gap:"3px",height:"28px",marginBottom:"8px"}}>
          {Array.from({length:20}).map((_,i)=><div key={i} style={{width:"3px",borderRadius:"2px",background:acL,animation:`wave .8s ease infinite ${i*.05}s`}}/>)}
        </div>}

        {/* Live transcript */}
        {isRec&&<div style={{width:"100%",maxHeight:"160px",overflow:"auto",padding:"10px 12px",borderRadius:"12px",background:cBg,border:"1px solid "+bd,marginBottom:"8px"}}>
          <div style={{fontSize:fs.xs,color:acL,fontWeight:600,marginBottom:"4px"}}>{tr.liveTranscript}</div>
          {liveLines.length===0&&!interimLine&&<div style={{fontSize:fs.s,color:t3,fontStyle:"italic"}}>{tr.listeningLabel}</div>}
          {liveLines.map((l,i)=><div key={i} style={{fontSize:fs.s,color:t2,padding:"2px 0",lineHeight:1.5}}>{l}</div>)}
          {interimLine&&<div style={{fontSize:fs.s,color:t3,fontStyle:"italic"}}>{interimLine}...</div>}
        </div>}
        {isRec&&<div style={{fontSize:fs.xs,color:t3,marginBottom:"6px",textAlign:"center"}}>{groqKey?tr.groqReady+" — Whisper will transcribe after stop":tr.noGroqKey}</div>}

        {/* Upload section */}
        {!isRec&&<div style={{width:"100%",marginTop:"4px"}}>
          <div style={{textAlign:"center",fontSize:fs.xs,color:t3,marginBottom:"8px"}}>{tr.orUploadAudio}</div>
          <input id="aup" type="file" accept="audio/*,.mp3,.m4a,.wav,.aac,.webm,.ogg,.caf,.mp4" style={{display:"none"}}
            onChange={e=>{
              const f=e.target.files?.[0];if(!f)return;
              e.target.value="";
              uploadBlobRef.current=f;
              setUploadedFileName(f.name);
              setAudioUrl(URL.createObjectURL(f));
              setUploadStatus("ready");
            }}/>
          {uploadStatus==="idle"&&<button onClick={()=>document.getElementById("aup").click()}
            style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",padding:"14px",borderRadius:"14px",border:"2px dashed "+bd,background:cBg,color:acL,fontSize:fs.b,fontWeight:600,cursor:"pointer"}}>
            <UpIc/><div style={{textAlign:"left"}}><div>{tr.uploadAudio}</div><div style={{fontSize:fs.xs,color:t3,fontWeight:400,marginTop:"1px"}}>{tr.mp3Supported}</div></div>
          </button>}
          {uploadStatus==="ready"&&<div style={{borderRadius:"14px",border:"1px solid rgba(34,197,94,.25)",background:"rgba(34,197,94,.04)",padding:"12px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}>
              <span style={{fontSize:"20px"}}>🎵</span>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:fs.s,fontWeight:600,color:t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{uploadedFileName}</div><div style={{fontSize:fs.xs,color:"#4ade80"}}>{tr.readyToAnalyse}</div></div>
              <button onClick={()=>{setUploadStatus("idle");setUploadedFileName("");setAudioUrl(null);uploadBlobRef.current=null;}} style={{background:"none",border:"none",color:t3,cursor:"pointer",fontSize:"18px"}}>×</button>
            </div>
            {audioUrl&&<audio controls src={audioUrl} style={{width:"100%",height:"36px",marginBottom:"10px",borderRadius:"8px"}}/>}
            <button onClick={async()=>{
              const blob=uploadBlobRef.current;
              if(!blob)return;
              setUploadStatus("processing");
              await runPipeline(blob,audioUrl,[],0);
            }} style={{width:"100%",padding:"13px",borderRadius:"12px",border:"none",background:acc,color:"#fff",fontSize:fs.b,fontWeight:700,cursor:"pointer"}}>
              🧠 Transcribe & Analyse
            </button>
            <button onClick={()=>document.getElementById("aup").click()} style={{width:"100%",marginTop:"6px",padding:"9px",borderRadius:"10px",border:"1px solid "+bd,background:"transparent",color:t3,fontSize:fs.s,cursor:"pointer"}}>{tr.chooseDiffFile}</button>
          </div>}
          {uploadStatus==="processing"&&<div style={{padding:"20px",borderRadius:"14px",border:"1px solid "+bd,background:cBg,textAlign:"center"}}>
            <div style={{display:"inline-block",width:"20px",height:"20px",borderRadius:"50%",border:"2px solid "+acL,borderTopColor:"transparent",animation:"spin 1s linear infinite",marginBottom:"8px"}}/>
            <div style={{fontSize:fs.s,color:t2}}>{tr.processingAudio}</div>
          </div>}
        </div>}
      </div>}

      {/* Past Visits tab */}
      {rTab==="history"&&<div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
        {visits.length===0&&<div style={{textAlign:"center",padding:"40px 20px",animation:"fadeUp .3s"}}>
          <div style={{fontSize:"48px",marginBottom:"12px"}}>🎙️</div>
          <div style={{fontSize:fs.h2,fontWeight:700,color:t1,marginBottom:"6px"}}>{tr.noVisitsYet}</div>
          <div style={{fontSize:fs.s,color:t3,marginBottom:"20px",lineHeight:1.6}}>{tr.noVisitsDesc}</div>
          <button onClick={()=>setRTab("new")} style={{padding:"11px 24px",borderRadius:"12px",border:"none",background:acc,color:"#fff",fontWeight:600,fontSize:fs.b,cursor:"pointer",boxShadow:"0 4px 12px rgba(0,123,255,.3)"}}>{tr.startRecording}</button>
        </div>}
        {visits.map((v,vi)=>{
          const hasProvItems=(v.extractedItems||[]).some(e=>e.status==="provisional");
          const showTranslated=lang!=="en"&&v.translatedSummary;
          const specColor=v.spec==="Cardiology"?"#f87171":v.spec==="General Practice"?"#4ade80":v.spec==="Document"?"#818cf8":acc;
          const specBg=v.spec==="Cardiology"?"rgba(248,113,113,.1)":v.spec==="General Practice"?"rgba(74,222,128,.1)":v.spec==="Document"?"rgba(129,140,248,.1)":acc+"10";
          return <div key={v.id} style={{borderRadius:"16px",background:cBg,border:hasProvItems?"1px solid rgba(245,158,11,.3)":"1px solid "+bd,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
            {/* Visit header */}
            <div style={{padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:"12px"}}>
                {/* Doctor avatar */}
                <div style={{width:"42px",height:"42px",borderRadius:"12px",background:acc+"15",border:"1px solid "+acc+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0}}>
                  {v.spec==="Document"?"📄":"🩺"}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap",marginBottom:"2px"}}>
                    <span style={{fontSize:fs.b,fontWeight:700,color:t1}}>{v.doc}</span>
                    {vi===0&&<span style={{padding:"2px 8px",borderRadius:"20px",background:"rgba(34,197,94,.12)",fontSize:fs.xs,color:"#4ade80",fontWeight:600}}>{tr.latestBadge}</span>}
                    {hasProvItems&&<span style={{padding:"2px 8px",borderRadius:"20px",background:"rgba(245,158,11,.12)",fontSize:fs.xs,color:"#fbbf24",fontWeight:600}}>{tr.unconfirmedBadge}</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
                    <span style={{fontSize:fs.xs,color:t3}}>{v.date} · {v.time}</span>
                    {v.spec&&<span style={{padding:"2px 8px",borderRadius:"20px",background:specBg,fontSize:fs.xs,color:specColor,fontWeight:600}}>{v.spec}</span>}
                  </div>
                </div>
              </div>

              {/* Audio playback */}
              {v.audioUrl&&<button onClick={()=>playAudio(v.audioUrl)} style={{marginTop:"10px",display:"flex",alignItems:"center",gap:"6px",padding:"6px 12px",borderRadius:"8px",border:"1px solid "+bd,background:isPlaying===v.audioUrl?"rgba(239,68,68,.06)":"transparent",color:isPlaying===v.audioUrl?"#ef4444":acL,fontSize:fs.xs,fontWeight:600,cursor:"pointer"}}>
                {isPlaying===v.audioUrl?<span>⏸ Pause</span>:<span>▶ Play Audio</span>}
                <span style={{color:t3,fontWeight:400}}>· {v.dur}</span>
              </button>}

              {/* Meds tags */}
              {(v.meds||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginTop:"10px"}}>{(v.meds||[]).map((m,i)=><span key={i} style={{display:"inline-flex",alignItems:"center",gap:"3px",padding:"3px 8px",borderRadius:"20px",background:acc+"0c",border:"1px solid "+acc+"15",fontSize:fs.xs,color:acL}}><PillIc/>{m.name}{m.dose?" "+m.dose:""}</span>)}</div>}
            </div>

            {/* Collapsible: Summary (original or translated) */}
            <button onClick={()=>tog(v.id+"-s")} style={{width:"100%",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",border:"none",borderTop:"1px solid "+bd,background:isO(v.id+"-s")?acc+"06":"transparent",cursor:"pointer",color:acL,fontSize:fs.s,fontWeight:600}}>
              <span style={{display:"flex",alignItems:"center",gap:"6px"}}>{showTranslated?tr.translatedSummary:tr.aiSummary} {v.summary===null&&<span style={{color:t3,fontWeight:400,fontSize:fs.xs}}>generating...</span>}{v.summary!==null&&lang!=="en"&&!v.translatedSummary&&<span style={{color:t3,fontWeight:400}}>{tr.originalLabel}</span>}</span>
              <ChevIc open={isO(v.id+"-s")}/>
            </button>
            {isO(v.id+"-s")&&<div style={{padding:"0 16px 12px",animation:"fadeUp .2s"}}>
              <div style={{padding:"12px",borderRadius:"10px",background:dk?"rgba(0,123,255,.03)":"rgba(0,123,255,.02)",fontSize:fs.s,color:t1,lineHeight:1.7,whiteSpace:"pre-wrap"}}>
                {v.summary===null
                  ?<div style={{display:"flex",alignItems:"center",gap:"8px",color:t3}}><div style={{width:"14px",height:"14px",borderRadius:"50%",border:"2px solid "+acL,borderTopColor:"transparent",animation:"spin 1s linear infinite",flexShrink:0}}/> {tr.generatingSummary}</div>
                  :(showTranslated?v.translatedSummary:v.summary)
                }
              </div>
              {v.summary&&v.summary.includes("could not be generated")&&<button onClick={()=>retryAI(v.id)} style={{marginTop:"6px",padding:"6px 12px",borderRadius:"8px",border:"none",background:acc+"12",color:acL,fontSize:fs.xs,fontWeight:600,cursor:"pointer"}}>{tr.retryBtn}</button>}
              {lang!=="en"&&v.summary&&!v.summary.includes("could not")&&!v.translatedSummary&&<button onClick={()=>translateVisit(v.id)} disabled={transLoading[v.id]} style={{marginTop:"6px",padding:"6px 12px",borderRadius:"8px",border:"1px solid "+acc+"20",background:acc+"08",color:acL,fontSize:fs.xs,fontWeight:600,cursor:"pointer"}}>
                {transLoading[v.id]?<span>{tr.translating}</span>:<span>{tr.translateTo(LANGS.find(l=>l.c===lang)?.n)}</span>}
              </button>}
              {showTranslated&&<div style={{marginTop:"6px",fontSize:fs.xs,color:t3}}>{tr.storedOriginal(v.originalLang.toUpperCase())}</div>}
            </div>}

            {/* Collapsible: Original Transcript */}
            <button onClick={()=>tog(v.id+"-t")} style={{width:"100%",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",border:"none",borderTop:"1px solid "+bd,background:isO(v.id+"-t")?"transparent":"transparent",cursor:"pointer",color:t2,fontSize:fs.s,fontWeight:600}}>
              <span>{tr.originalTranscript(v.originalLang.toUpperCase(),v.dur)}</span><ChevIc open={isO(v.id+"-t")}/>
            </button>
            {isO(v.id+"-t")&&<div style={{padding:"0 16px 12px",animation:"fadeUp .2s"}}><div style={{maxHeight:"180px",overflow:"auto",padding:"10px",borderRadius:"10px",background:dk?"rgba(255,255,255,.03)":bd+"40",border:"1px solid "+bd,fontSize:fs.s,color:t2,lineHeight:1.5}}>{(v.originalTranscript||[]).map((l,i)=><div key={i} style={{padding:"2px 0",color:l.startsWith("Doctor")?acL:t2}}>{l}</div>)}</div></div>}

            {/* Collapsible: Extracted Items with confirm/edit/delete */}
            {(v.extractedItems||[]).length>0&&<>
              <button onClick={()=>tog(v.id+"-e")} style={{width:"100%",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",border:"none",borderTop:"1px solid "+bd,background:isO(v.id+"-e")?"rgba(245,158,11,.04)":"transparent",cursor:"pointer",color:"#fbbf24",fontSize:fs.s,fontWeight:600}}>
                <span>{tr.extractedItems(v.extractedItems.length)}</span><ChevIc open={isO(v.id+"-e")}/>
              </button>
              {isO(v.id+"-e")&&<div style={{padding:"0 16px 12px",animation:"fadeUp .2s"}}>
                {v.extractedItems.map(item=>{
                  const isProv=item.status==="provisional";
                  const isCon=item.status==="confirmed";
                  return <div key={item.id} style={{padding:"10px",borderRadius:"10px",marginBottom:"6px",background:isProv?"rgba(245,158,11,.04)":isCon?"rgba(34,197,94,.04)":cBg,border:`1px ${isProv?"dashed":"solid"} ${isProv?"rgba(245,158,11,.2)":isCon?"rgba(34,197,94,.15)":bd}`,display:"flex",alignItems:"flex-start",gap:"8px"}}>
                    <div style={{fontSize:"14px",marginTop:"2px"}}>{item.type==="medication"?"💊":item.type==="appointment"?"📅":"📌"}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:fs.s,fontWeight:600,color:t1}}>{item.text}</div>
                      <div style={{fontSize:fs.xs,color:t3,marginTop:"2px"}}>⏰ {item.time}</div>
                      <div style={{display:"flex",alignItems:"center",gap:"4px",marginTop:"4px"}}>
                        <span style={{fontSize:fs.xs,padding:"2px 6px",borderRadius:"20px",background:isCon?"rgba(34,197,94,.1)":"rgba(245,158,11,.1)",color:isCon?"#4ade80":"#fbbf24",fontWeight:600}}>{isCon?tr.confirmed:tr.provisional}</span>
                      </div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:"3px",flexShrink:0}}>
                      {isProv&&<button onClick={()=>updateItemStatus(v.id,item.id,"confirmed")} style={{padding:"4px 8px",borderRadius:"6px",border:"none",background:"rgba(34,197,94,.15)",color:"#4ade80",fontSize:"10px",fontWeight:600,cursor:"pointer"}}>{tr.confirmBtn}</button>}
                      {isCon&&<button onClick={()=>updateItemStatus(v.id,item.id,"provisional")} style={{padding:"4px 8px",borderRadius:"6px",border:"none",background:dk?"rgba(255,255,255,.04)":"rgba(0,0,0,.04)",color:t3,fontSize:"10px",fontWeight:500,cursor:"pointer"}}>{tr.undoBtn}</button>}
                      <button onClick={()=>deleteItem(v.id,item.id)} style={{padding:"4px 8px",borderRadius:"6px",border:"none",background:"rgba(239,68,68,.08)",color:"#f87171",fontSize:"10px",fontWeight:500,cursor:"pointer"}}>{tr.deleteBtn}</button>
                    </div>
                  </div>;
                })}
              </div>}
            </>}
          </div>})}
      </div>}
    </div>}

    {/* ══ ASK AI ══ */}
    {view==="chat"&&!proc&&<div style={{display:"flex",flexDirection:"column",minHeight:"450px",animation:"fadeUp .4s",paddingTop:"18px"}}>
      <h2 style={{fontSize:fs.h1,fontWeight:800,marginBottom:"2px"}}>{tr.aiAssistant}</h2>
      <p style={{color:t3,fontSize:fs.s,marginBottom:"14px"}}>{tr.poweredBy(LANGS.find(l=>l.c===lang)?.n)}</p>
      <div style={{flex:1,overflow:"auto",marginBottom:"10px"}}>
        {msgs.length===0&&<div style={{paddingTop:"8px"}}>
          {/* Welcome bubble */}
          <div style={{padding:"14px",borderRadius:"16px",border:"1px solid "+bd,background:cBg,marginBottom:"14px",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
            <div style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
              <div style={{width:"32px",height:"32px",borderRadius:"50%",background:acc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:800,color:"#fff",flexShrink:0}}>R</div>
              <div style={{fontSize:fs.b,color:t1,lineHeight:1.6}}>{tr.chatWelcomeMsg}</div>
            </div>
          </div>
          <div style={{fontSize:fs.xs,color:t3,fontWeight:600,marginBottom:"8px",textTransform:"uppercase",letterSpacing:"0.4px"}}>Quick questions</div>
          {tr.chatQ.map(q=><button key={q} onClick={async()=>{setMsgs(p=>[...p,{r:"user",t:q}]);setChatL(true);const ctx=visits.map(v=>`[${v.date}] ${v.doc}: ${v.summary}`).join("\n");const ln=LANGS.find(l=>l.c===lang)?.n||"English";const a=await callGemini(`You are MedNote medical assistant. Patient records:\n${ctx}\nRespond in ${ln}. 2-4 sentences. Patient-friendly.`,q,geminiKey.trim());setMsgs(p=>[...p,{r:"ai",t:a||((T_EXTRA[lang]||T_EXTRA.en).chatConnectFailed||"Could not connect.")}]);setChatL(false);}} style={{display:"block",width:"100%",padding:"11px 14px",borderRadius:"12px",border:"1px solid "+bd,background:cBg,color:acL,fontSize:fs.b,cursor:"pointer",textAlign:"left",marginBottom:"6px",fontWeight:500}}>{q}</button>)}
        </div>}
        {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.r==="user"?"flex-end":"flex-start",marginBottom:"8px",animation:"fadeUp .3s",gap:"8px",alignItems:"flex-end"}}>
          {m.r==="ai"&&<div style={{width:"28px",height:"28px",borderRadius:"50%",background:acc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:800,color:"#fff",flexShrink:0}}>R</div>}
          <div style={{maxWidth:"82%",padding:"10px 14px",borderRadius:m.r==="user"?"18px 18px 4px 18px":"4px 18px 18px 18px",background:m.r==="user"?acc:cBg,border:m.r==="ai"?"1px solid "+bd:"none",fontSize:fs.b,lineHeight:1.6,color:m.r==="user"?"#fff":t1}}>{m.t}</div>
        </div>)}
        {chatL&&<div style={{display:"flex",gap:"8px",marginBottom:"8px",alignItems:"flex-end"}}><div style={{width:"28px",height:"28px",borderRadius:"50%",background:acc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:800,color:"#fff",flexShrink:0}}>R</div><div style={{padding:"12px 16px",borderRadius:"4px 18px 18px 18px",background:cBg,border:"1px solid "+bd,display:"flex",gap:"5px"}}>{[0,1,2].map(j=><div key={j} style={{width:"7px",height:"7px",borderRadius:"50%",background:acL,animation:`dot 1.2s infinite ${j*.2}s`}}/>)}</div></div>}
        <div ref={chatEnd}/>
      </div>
      <div style={{display:"flex",gap:"8px",padding:"6px",borderRadius:"14px",border:"1px solid "+bd,background:cBg}}>
        <input value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} placeholder={tr.chatPlaceholder} style={{flex:1,padding:"10px 12px",borderRadius:"10px",border:"none",background:"transparent",color:t1,fontSize:fs.b}}/>
        <button onClick={sendChat} disabled={chatL} style={{width:"40px",height:"40px",borderRadius:"10px",border:"none",background:chatL?t3:acc,color:"#fff",cursor:chatL?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:chatL?"none":"0 2px 8px rgba(0,123,255,.3)"}}><SendIc/></button>
      </div>
    </div>}

    {/* ══ MEDS ══ */}
    {view==="reminders"&&!proc&&<div style={{animation:"fadeUp .4s",paddingTop:"18px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
        <div>
          <h2 style={{fontSize:fs.h1,fontWeight:800,margin:0}}>{tr.medSchedule}</h2>
          <p style={{fontSize:fs.xs,color:t3,marginTop:"2px"}}>{new Date().toLocaleDateString(lang==="ar"?"ar-EG":lang==="zh"?"zh-CN":lang==="ja"?"ja-JP":lang==="ko"?"ko-KR":"en-US",{weekday:"long",month:"long",day:"numeric"})}</p>
        </div>
        <button onClick={()=>setEditR({id:"new",name:"",dose:"",uTime:"8:00 AM",note:"",freq:"daily",type:"medication"})} style={{display:"flex",alignItems:"center",gap:"5px",padding:"8px 14px",borderRadius:"10px",border:"none",background:acc,color:"#fff",fontSize:fs.s,fontWeight:600,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,123,255,.3)"}}>{tr.addReminderBtn.replace("+ ","+ ")}</button>
      </div>

      {/* Category tabs */}
      <div style={{display:"flex",gap:"6px",marginBottom:"14px",overflowX:"auto",paddingBottom:"2px"}}>{[{id:"all",label:tr.allTab,icon:"📋"},{id:"medication",label:tr.medicationTab,icon:"💊"},{id:"appointment",label:tr.appointmentsTab,icon:"📅"},{id:"action",label:tr.todoTab,icon:"📌"}].map(tab=>{
        const count=tab.id==="all"?rems.length:rems.filter(r=>(r.type||"medication")===tab.id).length;
        const active=remTab===tab.id;
        return <button key={tab.id} onClick={()=>setRemTab(tab.id)} style={{display:"flex",alignItems:"center",gap:"4px",padding:"6px 12px",borderRadius:"20px",border:"1px solid "+(active?acc:bd),background:active?acc+"18":"transparent",color:active?acL:t2,fontSize:fs.xs,fontWeight:active?700:500,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
          <span>{tab.icon}</span><span>{tab.label}</span>
          {count>0&&<span style={{background:active?acc:bd,color:active?"#fff":t3,borderRadius:"10px",padding:"0 5px",fontSize:"10px",fontWeight:700}}>{count}</span>}
        </button>;
      })}</div>

      {/* Progress summary */}
      <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"16px",padding:"12px 14px",borderRadius:"14px",background:cBg,border:"1px solid "+bd}}>
        <svg width="48" height="48" viewBox="0 0 60 60" style={{flexShrink:0}}>
          <circle cx="30" cy="30" r="24" fill="none" stroke={bd} strokeWidth="5"/>
          <circle cx="30" cy="30" r="24" fill="none" stroke={acc} strokeWidth="5" strokeLinecap="round" strokeDasharray={`${(rems.length>0?doneN/rems.length:0)*150.8} 150.8`} transform="rotate(-90 30 30)" style={{transition:"stroke-dasharray .6s"}}/>
          <text x="30" y="35" textAnchor="middle" fontSize="14" fontWeight="700" fill={t1}>{rems.length>0?Math.round(doneN/rems.length*100):0}%</text>
        </svg>
        <div style={{flex:1}}>
          <div style={{fontSize:fs.b,fontWeight:700,color:t1,marginBottom:"2px"}}>{doneN===rems.length&&rems.length>0?tr.allDone:tr.remaining(Math.max(0,rems.length-doneN))}</div>
          <div style={{fontSize:fs.xs,color:t3}}>{tr.completedToday(doneN,rems.length)}</div>
        </div>
        {missN>0&&<div style={{padding:"4px 10px",borderRadius:"20px",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",fontSize:fs.xs,color:"#f87171",fontWeight:700,flexShrink:0}}>{missN} overdue</div>}
      </div>

      {rems.length===0&&<div style={{textAlign:"center",padding:"32px 20px",animation:"fadeUp .3s"}}>
        <div style={{fontSize:"40px",marginBottom:"10px"}}>💊</div>
        <div style={{fontSize:fs.s,fontWeight:600,color:t1,marginBottom:"4px"}}>{tr.noRemindersYet}</div>
        <div style={{fontSize:fs.xs,color:t3,marginBottom:"16px"}}>{tr.noRemindersDesc}</div>
        <button onClick={()=>setEditR({id:"new",name:"",dose:"",uTime:"8:00 AM",note:"",freq:"daily",type:"medication"})} style={{padding:"9px 20px",borderRadius:"10px",border:"none",background:acc,color:"#fff",fontWeight:600,fontSize:fs.s,cursor:"pointer"}}>{tr.addReminderBtn}</button>
      </div>}

      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
        {[...rems].filter(r=>remTab==="all"||(r.type||"medication")===remTab).sort((a,b)=>a.hr-b.hr).map(r=>{
          const over=!r.done&&(r.hr*60+(r.mn||0))<nowTotalMin;
          const c=over?"#ef4444":r.done?"#22c55e":r.type==="appointment"?"#22c55e":r.type==="action"?"#f59e0b":acc;
          const imgKey=r.name.toLowerCase().split(" ")[0];
          const imgInfo=medImgData[imgKey];
          const imgOpen=!!showMedImg[r.id];
          const typeIcon=r.type==="appointment"?"📅":r.type==="action"?"📌":"💊";
          return <div key={r.id} style={{display:"flex",flexDirection:"column",padding:"13px 14px",borderRadius:"14px",background:over?"rgba(239,68,68,.06)":r.done?"rgba(34,197,94,.04)":cBg,border:over?"1.5px solid rgba(239,68,68,.3)":"1px solid "+(r.done?"rgba(34,197,94,.2)":bd),animation:over?"glow 2s infinite":"none",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{width:"38px",height:"38px",borderRadius:"10px",background:c+"14",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0}}>{typeIcon}</div>
              <div style={{flex:1,minWidth:0}}>
                <button onClick={()=>toggleMedImg(r.id,r.name)} style={{background:"none",border:"none",padding:0,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:"5px",width:"100%"}}>
                  <span style={{fontWeight:600,fontSize:fs.b,color:t1}}>{r.name}{r.dose&&` — ${r.dose}`}</span>
                  <span style={{fontSize:"10px",color:acL,opacity:.6}}>{imgOpen?"▲":"▼"}</span>
                </button>
                <div style={{display:"flex",alignItems:"center",gap:"5px",marginTop:"3px",flexWrap:"wrap"}}>
                  <span style={{fontSize:fs.xs,fontWeight:700,padding:"2px 8px",borderRadius:"20px",background:c+"14",color:c}}>{r.uTime}</span>
                  <span style={{fontSize:fs.xs,fontWeight:600,padding:"2px 8px",borderRadius:"20px",background:bd,color:t2}}>{r.freq==="once"?tr.once:r.freq==="weekly"?tr.weekly:tr.daily}</span>
                  {r.note&&<span style={{fontSize:fs.xs,color:t3}}>· {r.note}</span>}
                </div>
                {over&&<div style={{fontSize:fs.xs,color:"#ef4444",fontWeight:700,marginTop:"3px"}}>{tr.overdue}</div>}
              </div>
              {/* Done toggle */}
              <button onClick={()=>setRems(p=>p.map(x=>x.id===r.id?{...x,done:!x.done}:x))} style={{width:"34px",height:"34px",borderRadius:"10px",border:"none",background:r.done?"#22c55e":c+"20",color:r.done?"#fff":c,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s"}}>{r.done?<ChkIc/>:<span style={{fontSize:"16px"}}>○</span>}</button>
              {/* Calendar export */}
              <div style={{position:"relative",flexShrink:0}}>
                <button onClick={()=>setCalExportOpen(calExportOpen===r.id?null:r.id)} style={{width:"30px",height:"30px",borderRadius:"8px",border:"1px solid "+bd,background:"transparent",color:t3,cursor:"pointer",fontSize:"13px",display:"flex",alignItems:"center",justifyContent:"center"}}>📅</button>
                {calExportOpen===r.id&&<div style={{position:"absolute",right:0,bottom:"36px",background:dk?"#1a2035":"#fff",border:"1px solid "+bd,borderRadius:"12px",padding:"6px",zIndex:50,width:"175px",boxShadow:"0 8px 24px rgba(0,0,0,.4)",animation:"popIn .15s"}}>
                  <div style={{fontSize:fs.xs,color:t3,fontWeight:600,padding:"3px 8px 6px",borderBottom:"1px solid "+bd,marginBottom:"4px"}}>{tr.addToCalendar}</div>
                  {[{icon:"🗓️",label:"Google Calendar",fn:()=>{window.open(buildGoogleUrl(r),"_blank");setCalExportOpen(null);}},{icon:"🍎",label:"Apple Calendar",fn:()=>{downloadICS(r);setCalExportOpen(null);}},{icon:"📧",label:"Outlook Calendar",fn:()=>{downloadICS(r);setCalExportOpen(null);}}].map(opt=><button key={opt.label} onClick={opt.fn} style={{display:"flex",alignItems:"center",gap:"8px",width:"100%",padding:"7px 8px",borderRadius:"8px",border:"none",background:"transparent",color:t1,fontSize:fs.s,cursor:"pointer",textAlign:"left"}}>{opt.icon} {opt.label}</button>)}
                </div>}
              </div>
              {/* Edit */}
              <button onClick={()=>setEditR({id:r.id,name:r.name,dose:r.dose||"",uTime:r.uTime||r.time,note:r.note||"",freq:r.freq||"daily",type:r.type||"medication"})} style={{width:"30px",height:"30px",borderRadius:"8px",border:"1px solid "+bd,background:"transparent",color:t3,cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✏️</button>
            </div>
            {imgOpen&&<div style={{marginTop:"10px",paddingTop:"10px",borderTop:"1px solid "+bd,animation:"fadeUp .2s"}}>
              {!imgInfo||imgInfo.loading
                ?<div style={{display:"flex",alignItems:"center",gap:"6px",color:t3,fontSize:fs.xs}}><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span> Loading image...</div>
                :imgInfo.url
                  ?<img src={imgInfo.url} alt={r.name} style={{maxWidth:"100%",maxHeight:"130px",borderRadius:"8px",objectFit:"contain"}}/>
                  :<div style={{display:"flex",alignItems:"center",gap:"6px",color:t3,fontSize:fs.xs}}>💊 No packaging image available</div>}
            </div>}
          </div>;
        })}
      </div>
    </div>}

    {/* ══ EDIT / ADD REMINDER MODAL ══ */}
    {editR&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.72)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:300,animation:"fadeIn .2s"}} onClick={e=>{if(e.target===e.currentTarget)setEditR(null);}}>
      <div style={{width:"100%",maxWidth:"390px",background:dk?"#0f1623":"#ffffff",borderRadius:"24px 24px 0 0",padding:"20px 18px 36px"}}>
        <div style={{width:"36px",height:"4px",borderRadius:"2px",background:bd,margin:"0 auto 16px"}}/>
        <div style={{fontSize:fs.h2,fontWeight:800,marginBottom:"16px"}}>{editR.id==="new"?tr.addReminderTitle:tr.editReminderTitle}</div>

        <div style={{marginBottom:"12px"}}>
          <div style={{fontSize:fs.xs,color:t3,fontWeight:600,marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.4px"}}>{tr.nameLabel}</div>
          <input value={editR.name} onChange={e=>setEditR(p=>({...p,name:e.target.value}))} placeholder="e.g. Metformin" style={{width:"100%",padding:"10px 12px",borderRadius:"10px",border:"1px solid "+(editR.name.trim()?acc+"60":bd),background:dk?"rgba(255,255,255,.06)":"rgba(0,0,0,.03)",color:t1,fontSize:fs.b}}/>
        </div>

        <div style={{marginBottom:"12px"}}>
          <div style={{fontSize:fs.xs,color:t3,fontWeight:600,marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.4px"}}>{tr.doseLabel}</div>
          <input value={editR.dose} onChange={e=>setEditR(p=>({...p,dose:e.target.value}))} placeholder="e.g. 750mg" style={{width:"100%",padding:"10px 12px",borderRadius:"10px",border:"1px solid "+bd,background:dk?"rgba(255,255,255,.06)":"rgba(0,0,0,.03)",color:t1,fontSize:fs.b}}/>
        </div>

        <div style={{marginBottom:"12px"}}>
          <div style={{fontSize:fs.xs,color:t3,fontWeight:600,marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.4px"}}>{tr.timeLabel}</div>
          <input value={editR.uTime} onChange={e=>setEditR(p=>({...p,uTime:e.target.value}))} placeholder="e.g. 8:00 AM" style={{width:"100%",padding:"10px 12px",borderRadius:"10px",border:"1px solid "+bd,background:dk?"rgba(255,255,255,.06)":"rgba(0,0,0,.03)",color:t1,fontSize:fs.b}}/>
        </div>

        <div style={{marginBottom:"12px"}}>
          <div style={{fontSize:fs.xs,color:t3,fontWeight:600,marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.4px"}}>{tr.noteLabel}</div>
          <input value={editR.note} onChange={e=>setEditR(p=>({...p,note:e.target.value}))} placeholder="e.g. With breakfast" style={{width:"100%",padding:"10px 12px",borderRadius:"10px",border:"1px solid "+bd,background:dk?"rgba(255,255,255,.06)":"rgba(0,0,0,.03)",color:t1,fontSize:fs.b}}/>
        </div>

        <div style={{marginBottom:"20px"}}>
          <div style={{fontSize:fs.xs,color:t3,fontWeight:600,marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.4px"}}>{tr.categoryLabel}</div>
          <div style={{display:"flex",gap:"6px",marginBottom:"12px"}}>
            {[{v:"medication",icon:"💊",label:"Medication"},{v:"appointment",icon:"📅",label:"Appointment"},{v:"action",icon:"📌",label:"To Do"}].map(t=><button key={t.v} onClick={()=>setEditR(p=>({...p,type:t.v}))} style={{flex:1,padding:"8px 4px",borderRadius:"10px",border:"1px solid "+(editR.type===t.v?acc:bd),background:editR.type===t.v?acc+"18":"transparent",color:editR.type===t.v?acL:t2,fontWeight:editR.type===t.v?700:400,fontSize:"11px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}><span style={{fontSize:"16px"}}>{t.icon}</span>{t.label}</button>)}
          </div>
          <div style={{fontSize:fs.xs,color:t3,fontWeight:600,marginBottom:"5px",textTransform:"uppercase",letterSpacing:"0.4px"}}>{tr.frequencyLabel}</div>
          <div style={{display:"flex",gap:"6px"}}>
            {[{v:"daily",l:tr.daily},{v:"weekly",l:tr.weekly},{v:"once",l:tr.once}].map(({v:f,l:fl})=><button key={f} onClick={()=>setEditR(p=>({...p,freq:f}))} style={{flex:1,padding:"8px",borderRadius:"10px",border:"1px solid "+(editR.freq===f?acc:bd),background:editR.freq===f?acc+"18":"transparent",color:editR.freq===f?acL:t2,fontWeight:editR.freq===f?700:400,fontSize:fs.s,cursor:"pointer"}}>{fl}</button>)}
          </div>
        </div>

        <div style={{display:"flex",gap:"8px"}}>
          <button onClick={saveRem} disabled={!editR.name.trim()} style={{flex:1,padding:"12px",borderRadius:"12px",border:"none",background:editR.name.trim()?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(99,102,241,.3)",color:"#fff",fontWeight:700,fontSize:fs.b,cursor:editR.name.trim()?"pointer":"not-allowed"}}>{tr.saveBtn}</button>
          {editR.id!=="new"&&<button onClick={()=>{setRems(p=>p.filter(x=>x.id!==editR.id));setEditR(null);}} style={{padding:"12px 16px",borderRadius:"12px",border:"none",background:"rgba(239,68,68,.12)",color:"#f87171",fontWeight:600,fontSize:fs.b,cursor:"pointer"}}>Delete</button>}
          <button onClick={()=>setEditR(null)} style={{padding:"12px 16px",borderRadius:"12px",border:"1px solid "+bd,background:"transparent",color:t2,fontWeight:500,fontSize:fs.b,cursor:"pointer"}}>{tr.cancelBtn}</button>
        </div>
      </div>
    </div>}

    {/* ══ HEALTH ══ */}
    {view==="health"&&<div style={{animation:"fadeUp .4s",paddingTop:"18px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
        <h2 style={{fontSize:fs.h1,fontWeight:800}}>{tr.healthTitle}</h2>
        <div style={{display:"flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"20px",background:"rgba(34,197,94,.1)",border:"1px solid rgba(34,197,94,.2)"}}>
          <div style={{width:"7px",height:"7px",borderRadius:"50%",background:"#22c55e"}}/>
          <span style={{fontSize:fs.xs,color:"#4ade80",fontWeight:600}}>Apple Health</span>
        </div>
      </div>
      <div style={{borderRadius:"16px",padding:"14px",marginBottom:"10px",background:"rgba(239,68,68,.04)",border:"1px solid rgba(239,68,68,.12)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px",color:"#f87171",fontWeight:600,fontSize:fs.b}}><WarnIc/> {tr.warnings}</div>
        <div style={{fontSize:fs.s,color:dk?"#fca5a5":"#dc2626",lineHeight:1.6}}>Nausea/cramps (1-2wk normal). URGENT: muscle pain or fatigue → call doctor (lactic acidosis)</div>
      </div>
      <div style={{borderRadius:"16px",padding:"14px",marginBottom:"10px",background:"rgba(34,197,94,.04)",border:"1px solid rgba(34,197,94,.12)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"8px",color:"#4ade80",fontWeight:600,fontSize:fs.b}}><span>❤️</span> Lifestyle</div>
        {["Cut refined carbs","Walk 30 min/day, 5x/week","Walk after meals"].map((item,i)=><div key={i} style={{fontSize:fs.s,color:dk?"#86efac":"#16a34a",padding:"2px 0",lineHeight:1.6}}>• {item}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
        {[{l:"Blood Glucose",v:"142",u:"mg/dL",c:"#fb923c",sub:"target 80-130",p:"M0,20 L15,16 L30,22 L45,14 L60,18 L75,12 L90,15 L105,10 L120,14"},{l:"Steps",v:"4,832",c:"#4ade80",sub:"goal 6,000",bars:1},{l:"Heart Rate",v:"72",u:"bpm",c:"#f87171",sub:"resting",p:"M0,14 L10,14 L15,4 L20,24 L25,14 L40,14 L50,6 L55,22 L60,14 L80,14 L85,5 L90,23 L95,14 L120,14"},{l:"Weight",v:"78.2",u:"kg",c:"#818cf8",sub:"↓ 1.3 kg",p:"M0,8 L20,10 L40,9 L60,12 L80,14 L100,16 L120,18"}].map((d,i)=><div key={i} style={{background:d.c+"0c",border:"1px solid "+d.c+"18",borderRadius:"14px",padding:"13px"}}>
          <div style={{fontSize:fs.xs,color:t2,marginBottom:"4px"}}>{d.l}</div>
          <div style={{display:"flex",alignItems:"baseline",gap:"3px"}}><span style={{fontSize:"22px",fontWeight:800,color:d.c}}>{d.v}</span>{d.u&&<span style={{fontSize:fs.xs,color:t3}}>{d.u}</span>}</div>
          {d.p&&<svg width="100%" height="26" viewBox="0 0 120 28" style={{marginTop:"6px"}}><path d={d.p} fill="none" stroke={d.c} strokeWidth="1.5" strokeLinecap="round"/></svg>}
          {d.bars&&<div style={{display:"flex",alignItems:"flex-end",gap:"3px",height:"26px",marginTop:"6px"}}>{[62,38,71,54,41,82,48].map((v,j)=><div key={j} style={{flex:1,borderRadius:"2px",height:`${v}%`,background:j===6?d.c:d.c+"30"}}/>)}</div>}
          {d.sub&&<div style={{fontSize:fs.xs,color:t3,marginTop:"5px"}}>{d.sub}</div>}
        </div>)}
      </div>
      <div style={{borderRadius:"16px",padding:"14px",background:"rgba(99,102,241,.06)",border:"1px solid rgba(99,102,241,.15)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px",color:acL,fontWeight:600,fontSize:fs.b}}><span>🧠</span> AI Insight</div>
        <div style={{fontSize:fs.s,color:t1,lineHeight:1.6}}>Blood glucose (138 avg) above target. Steps up 15% — keep going! Dr. Chen recommended 6,000+/day.</div>
      </div>
    </div>}

    {/* ══ UPLOAD ══ */}
    {view==="upload"&&<div style={{animation:"fadeUp .4s",paddingTop:"18px"}}>
      <h2 style={{fontSize:fs.h1,fontWeight:800,marginBottom:"6px"}}>{tr.uploadTitle}</h2>
      <p style={{fontSize:fs.xs,color:t3,marginBottom:"14px"}}>{tr.uploadDocDesc}</p>
      <input ref={docFileRef} type="file" accept=".pdf,.png,.jpg,.jpeg,.webp,.gif" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(f)processDocFile(f);e.target.value="";}}/>
      <div onClick={()=>docProc==="idle"&&docFileRef.current?.click()} style={{padding:"40px 20px",borderRadius:"16px",border:"2px dashed "+(docProc==="processing"?acc:bd),textAlign:"center",background:cBg,cursor:docProc==="idle"?"pointer":"default",transition:"border .2s"}}>
        {docProc==="processing"
          ?<><div style={{fontSize:"40px",marginBottom:"12px",animation:"spin 2s linear infinite"}}>⟳</div>
            <div style={{fontSize:fs.b,fontWeight:600,color:acL}}>{tr.analyzingDoc}</div>
            <div style={{fontSize:fs.s,color:t3,marginTop:"4px"}}>{tr.geminiReading}</div></>
          :<><div style={{fontSize:"40px",marginBottom:"12px"}}>📄</div>
            <div style={{fontSize:fs.b,fontWeight:600,marginBottom:"6px"}}>{tr.uploadDrag}</div>
            <div style={{fontSize:fs.s,color:t2,marginBottom:"14px"}}>PDF, PNG, JPG, WebP</div>
            <button onClick={e=>{e.stopPropagation();docFileRef.current?.click();}} style={{padding:"10px 22px",borderRadius:"10px",border:"none",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontSize:fs.b,fontWeight:600,cursor:"pointer"}}>{tr.chooseFile}</button>
            {!geminiKey&&<div style={{fontSize:fs.xs,color:"#fbbf24",marginTop:"12px"}}>{tr.requiresGemini}</div>}
          </>}
      </div>
    </div>}

    {/* ══ CALENDAR ══ */}
    {view==="calendar"&&<div style={{animation:"fadeUp .4s",paddingTop:"18px"}}>
      {/* Month nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
        <button onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m-1);return{y:d.getFullYear(),m:d.getMonth()}})} style={{width:"34px",height:"34px",borderRadius:"10px",border:"1px solid "+bd,background:"transparent",color:t1,fontSize:"18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <h2 style={{fontSize:fs.h1,fontWeight:800}}>{new Date(calMonth.y,calMonth.m).toLocaleDateString(lang==="ar"?"ar-EG":lang==="zh"?"zh-CN":lang==="ja"?"ja-JP":lang==="ko"?"ko-KR":"en-US",{month:"long",year:"numeric"})}</h2>
        <button onClick={()=>setCalMonth(p=>{const d=new Date(p.y,p.m+1);return{y:d.getFullYear(),m:d.getMonth()}})} style={{width:"34px",height:"34px",borderRadius:"10px",border:"1px solid "+bd,background:"transparent",color:t1,fontSize:"18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      </div>
      {/* Day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px",marginBottom:"4px"}}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:fs.xs,color:t3,padding:"4px 0",fontWeight:600}}>{d}</div>)}
      </div>
      {/* Day cells */}
      {(()=>{
        const firstDay=new Date(calMonth.y,calMonth.m,1).getDay();
        const daysInMonth=new Date(calMonth.y,calMonth.m+1,0).getDate();
        const today=new Date();
        const todayKey=`${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;
        const cells=[];
        for(let i=0;i<firstDay;i++)cells.push(<div key={"p"+i}/>);
        for(let d=1;d<=daysInMonth;d++){
          const key=`${calMonth.y}-${calMonth.m}-${d}`;
          const isToday=key===todayKey;
          const isSel=calDay===key;
          const hasDailyRems=rems.filter(r=>r.freq==="daily"||!r.freq).length>0;
          const hasWeeklyRems=rems.filter(r=>r.freq==="weekly").length>0;
          const hasMeds=rems.filter(r=>(r.freq==="daily"||!r.freq)&&r.type==="medication").length>0;
          const hasAppts=rems.filter(r=>(r.freq==="daily"||!r.freq)&&r.type==="appointment").length>0;
          cells.push(
            <div key={key} onClick={()=>setCalDay(isSel?null:key)} style={{textAlign:"center",padding:"6px 2px",borderRadius:"10px",background:isSel?acc+"30":isToday?acc+"18":cBg,border:isSel?"2px solid "+acc:isToday?"1px solid "+acc+"40":"1px solid "+bd,cursor:"pointer",minHeight:"46px"}}>
              <div style={{fontSize:fs.xs,color:isSel?acL:isToday?acL:t1,fontWeight:isToday||isSel?700:400,marginBottom:"3px"}}>{d}</div>
              <div style={{display:"flex",justifyContent:"center",gap:"2px",flexWrap:"wrap"}}>
                {hasMeds&&<div style={{width:"5px",height:"5px",borderRadius:"50%",background:"#6366f1"}}/>}
                {hasAppts&&<div style={{width:"5px",height:"5px",borderRadius:"50%",background:"#22c55e"}}/>}
                {hasWeeklyRems&&<div style={{width:"5px",height:"5px",borderRadius:"50%",background:"#f59e0b"}}/>}
              </div>
            </div>
          );
        }
        return <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px",marginBottom:"14px"}}>{cells}</div>;
      })()}
      {/* Selected day schedule */}
      {calDay&&<div style={{animation:"fadeUp .2s"}}>
        <div style={{fontSize:fs.s,fontWeight:700,color:acL,marginBottom:"8px"}}>
          {new Date(calMonth.y,calMonth.m,parseInt(calDay.split("-")[2])).toLocaleDateString(lang==="ar"?"ar-EG":lang==="zh"?"zh-CN":lang==="ja"?"ja-JP":lang==="ko"?"ko-KR":"en-US",{weekday:"long",month:"long",day:"numeric"})}
        </div>
        {[...rems].filter(r=>r.freq==="daily"||!r.freq||(r.freq==="weekly")).sort((a,b)=>a.hr-b.hr).map(r=>(
          <div key={r.id} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",borderRadius:"12px",background:cBg,border:"1px solid "+bd,marginBottom:"6px"}}>
            <span style={{fontSize:"18px"}}>{r.type==="appointment"?"📅":r.type==="action"?"📌":"💊"}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:fs.s,fontWeight:600,color:t1}}>{r.name}{r.dose?` — ${r.dose}`:""}</div>
              <div style={{fontSize:fs.xs,color:t3}}>{r.uTime}{r.note?" · "+r.note:""}</div>
            </div>
            <span style={{fontSize:fs.xs,padding:"2px 7px",borderRadius:"6px",background:acc+"12",color:acL,fontWeight:600}}>{r.freq==="weekly"?tr.weekly:tr.daily}</span>
          </div>
        ))}
        {rems.filter(r=>r.freq==="daily"||!r.freq||r.freq==="weekly").length===0&&
          <div style={{textAlign:"center",color:t3,fontSize:fs.s,padding:"20px"}}>{tr.noRemindersScheduled}</div>}
      </div>}
      {!calDay&&<div style={{textAlign:"center",color:t3,fontSize:fs.s,padding:"12px 0"}}>{tr.tapDaySchedule}</div>}
    </div>}

    </main>

    {/* ══ NAV — visible on all views ══ */}
    <div style={{position:"sticky",bottom:0,padding:"6px 12px 10px",display:"flex",justifyContent:"center",background:navBgC,backdropFilter:"blur(16px)",borderTop:"1px solid "+bd}}>
      <nav style={{display:"flex",justifyContent:"space-evenly",alignItems:"center",width:"100%",maxWidth:"390px",padding:elder?"8px 4px":"6px 2px"}}>
        <button onClick={()=>setView("home")} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",background:"transparent",border:"none",color:view==="home"?navAct:navInact,cursor:"pointer",padding:"4px 10px",borderRadius:"14px",position:"relative"}}>
          <HomeIc s={elder?22:18}/>
          <span style={{fontSize:elder?"12px":"10px",fontWeight:view==="home"?800:500}}>{tr.home}</span>
          {view==="home"&&<div style={{position:"absolute",bottom:"1px",width:"18px",height:"2.5px",borderRadius:"2px",background:navAct}}/>}
        </button>
        {navItems.map(n=>{const active=view===n.id||(n.id==="records"&&view==="upload");return <button key={n.id} onClick={()=>setView(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",background:"transparent",border:"none",position:"relative",color:active?navAct:navInact,cursor:"pointer",padding:"4px 10px",borderRadius:"14px"}}>
          {n.badge>0&&<div style={{position:"absolute",top:"-2px",right:"2px",minWidth:"16px",height:"16px",borderRadius:"8px",background:"#ef4444",fontSize:"9px",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",padding:"0 4px"}}>{n.badge}</div>}
          <div style={{opacity:active?1:.45}}>{n.ic}</div>
          <span style={{fontSize:elder?"12px":"10px",fontWeight:active?800:500}}>{n.l}</span>
          {active&&<div style={{position:"absolute",bottom:"1px",width:"18px",height:"2.5px",borderRadius:"2px",background:navAct}}/>}
        </button>})}
      </nav>
    </div>

    {/* ══ NOTIFICATION MODAL ══ */}
    {notifModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.72)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200,animation:"fadeIn .2s"}}>
      <div style={{width:"100%",maxWidth:"390px",background:dk?"#0f1623":"#ffffff",borderRadius:"24px 24px 0 0",padding:"20px 18px 36px",maxHeight:"88vh",overflow:"auto"}}>
        <div style={{width:"36px",height:"4px",borderRadius:"2px",background:bd,margin:"0 auto 16px"}}/>
        <div style={{fontSize:fs.h2,fontWeight:800,marginBottom:"4px"}}>{tr.confirmNotifsTitle}</div>
        <div style={{fontSize:fs.s,color:t2,marginBottom:"14px"}}>
          {tr.aiFoundMsg(notifModal.items.length)}
        </div>
        {notifModal.items.map((item,idx)=>{
          const pad=n=>String(n).padStart(2,"0");
          const tv=`${pad(item.notifHour||8)}:${pad(item.notifMin||0)}`;
          const updateItem=(fields)=>setNotifModal(prev=>{const items=[...prev.items];items[idx]={...items[idx],...fields};return{...prev,items};});
          return <div key={item.id} style={{padding:"11px 13px",borderRadius:"13px",background:cBg,border:"1px solid "+bd,marginBottom:"8px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:"8px",marginBottom:"8px"}}>
              <span style={{fontSize:"18px",flexShrink:0,marginTop:"6px"}}>{item.type==="medication"?"💊":item.type==="appointment"?"📅":"📌"}</span>
              <input value={item.text} onChange={e=>updateItem({text:e.target.value})}
                style={{flex:1,padding:"6px 8px",borderRadius:"8px",border:"1px solid "+bd,background:dk?"rgba(255,255,255,.06)":"rgba(0,0,0,.03)",color:t1,fontSize:fs.s,fontWeight:600,lineHeight:1.4}}/>
              <button onClick={()=>setNotifModal(prev=>({...prev,items:prev.items.filter((_,i)=>i!==idx)}))}
                style={{width:"26px",height:"26px",borderRadius:"6px",border:"none",background:"rgba(239,68,68,.1)",color:"#f87171",cursor:"pointer",fontSize:"13px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:fs.xs,color:t2,flexShrink:0}}>{tr.notifyAt}</span>
              <input type="time" value={tv}
                onChange={e=>{const[h,m]=(e.target.value||"08:00").split(":").map(Number);updateItem({notifHour:isNaN(h)?8:h,notifMin:isNaN(m)?0:m});}}
                style={{flex:1,padding:"6px 10px",borderRadius:"8px",border:"1px solid "+bd,background:dk?"rgba(255,255,255,.07)":"rgba(0,0,0,.04)",color:t1,fontSize:fs.s,cursor:"pointer"}}
              />
              <span style={{padding:"2px 7px",borderRadius:"6px",background:item.type==="medication"?acc+"14":item.type==="appointment"?"rgba(34,197,94,.1)":"rgba(99,102,241,.1)",color:item.type==="medication"?acL:item.type==="appointment"?"#4ade80":acL,fontSize:fs.xs,fontWeight:600,flexShrink:0}}>
                {item.type==="medication"?tr.daily:item.type==="appointment"?tr.once:tr.todoTab}
              </span>
            </div>
          </div>;
        })}
        <button onClick={()=>setNotifModal(prev=>({...prev,items:[...prev.items,{id:Date.now(),type:"medication",text:"",time:"",notifHour:8,notifMin:0}]}))}
          style={{width:"100%",padding:"9px",borderRadius:"10px",border:"1px dashed "+acc+"50",background:acc+"06",color:acL,fontSize:fs.s,fontWeight:600,cursor:"pointer",marginBottom:"8px"}}>
          {tr.addItemBtn}
        </button>
        <button onClick={()=>{
          const pad=n=>String(n).padStart(2,"0");
          const newRems=notifModal.items
            .filter(i=>i.text&&i.text.trim())
            .map((item,i)=>{
              const h=item.notifHour||8;const m=item.notifMin||0;
              const ampm=h>=12?"PM":"AM";const h12=h%12||12;
              const timeStr=`${h12}:${pad(m)} ${ampm}`;
              return{
                id:Date.now()+i,
                name:item.text.match(/\d+\s*mg/i)?item.text.split(/[\s,]/)[0]||item.text:item.text,
                dose:item.text.match(/\d+\s*mg/i)?.[0]||"",
                time:timeStr,note:item.text,done:false,
                type:item.type||"medication",
                freq:item.type==="appointment"?"once":"daily",
                hr:h,mn:0,mx:h+2,
                uTime:timeStr
              };
            });
          if(newRems.length>0)setRems(p=>[...p,...newRems]);
          setNotifModal(null);
          setView("records");setRTab("history");setShowProvNotif(true);
        }} style={{width:"100%",padding:"14px",borderRadius:"14px",border:"none",background:"linear-gradient(135deg,#6366f1,#a78bfa)",color:"#fff",fontSize:fs.b,fontWeight:700,cursor:"pointer",marginTop:"6px"}}>
          {tr.confirmSaveBtn}
        </button>
        <button onClick={()=>{setNotifModal(null);setView("records");setRTab("history");setShowProvNotif(true);}}
          style={{width:"100%",padding:"11px",borderRadius:"14px",border:"1px solid "+bd,background:"transparent",color:t3,fontSize:fs.s,cursor:"pointer",marginTop:"6px"}}>
          {tr.skipRemindersBtn}
        </button>
      </div>
    </div>}

  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<MedNote/>);
</script>
</body>
</html>
